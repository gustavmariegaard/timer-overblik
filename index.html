<!DOCTYPE html>
<html lang="da" style="height:100%">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer-overblik</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #191919; color: #e8e6df; padding: 2rem; }
  #lock { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 12px; background: #191919; }
  #lock p { font-size: 14px; color: #888; }
  #lock input { background: #252523; border: 0.5px solid #3a3a38; border-radius: 6px; color: #e8e6df; font-size: 15px; padding: 8px 10px; outline: none; text-align: center; letter-spacing: 0.1em; }
  #lock button { background: #1D9E75; border: none; border-radius: 6px; color: #fff; font-size: 14px; padding: 8px 20px; cursor: pointer; }
  #lock .error { color: #D85A30; font-size: 13px; display: none; }
  #app { display: none; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .card { background: #252523; border-radius: 10px; padding: 14px 16px; }
  .card-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 500; }
  .card-sub { font-size: 11px; color: #666; margin-top: 4px; }
  .ahead { color: #1D9E75; }
  .behind { color: #D85A30; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label { font-size: 12px; color: #888; }
  .input-group input { background: #252523; border: 0.5px solid #3a3a38; border-radius: 6px; color: #e8e6df; font-size: 15px; padding: 8px 10px; width: 100%; outline: none; }
  .input-group input:focus { border-color: #555; }
  .divider { border: none; border-top: 0.5px solid #2e2e2c; margin: 1.5rem 0; }
  .tbl-title { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 0; border-bottom: 0.5px solid #2e2e2c; }
  th:last-child { text-align: right; }
  td { padding: 9px 0; border-bottom: 0.5px solid #1e1e1c; color: #e8e6df; }
  td:last-child { text-align: right; font-weight: 500; }
  tr.current td { color: #1D9E75; }
  .mobile body { padding: 1rem; }
  .mobile .cards { grid-template-columns: 1fr; }
  .mobile .input-row { grid-template-columns: 1fr; }
  #gem-btn { display: none; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
  #gem-btn.dirty { display: block; background: #1D9E75; color: #fff; }
  #gem-btn.saved { display: block; background: #2a2a28; color: #555; cursor: default; }
</style>
</head>
<body>

<div id="lock">
  <p>Indtast PIN-kode</p>
  <input type="password" id="pin" placeholder="••••••••" maxlength="20">
  <button onclick="checkPin()">Bekræft</button>
  <span class="error" id="err">Forkert PIN-kode</span>
</div>

<button id="gem-btn" class="saved" onclick="gemVaerdier()">Gemt</button>

<hr class="divider">

<div id="app">
<h1>Timer-overblik</h1>

<div class="cards">
  <div class="card">
    <div class="card-label">Månedsmål</div>
    <div class="card-value" id="c-maal">125 t</div>
    <div class="card-sub" id="c-maaned"></div>
  </div>
  <div class="card">
    <div class="card-label">Dags dato-mål</div>
    <div class="card-value" id="c-dato">— t</div>
    <div class="card-sub" id="c-dato-sub"></div>
  </div>
  <div class="card">
    <div class="card-label">Registrerede timer</div>
    <div class="card-value" id="c-status">—</div>
    <div class="card-sub" id="c-status-sub">Indtast timer nedenfor</div>
  </div>
</div>

<div class="input-row">
  <div class="input-group">
    <label>Registrerede timer (fra Notion)</label>
    <input type="number" id="inp-timer" placeholder="0" min="0">
  </div>
  <div class="input-group">
    <label>Månedsmål (timer)</label>
    <input type="number" id="inp-maal" placeholder="125" value="125" min="1">
  </div>
</div>

<p class="tbl-title" id="tbl-titel"></p>
<table>
  <thead>
    <tr>
      <th>Periode</th>
      <th>Arbejdsdage gået</th>
      <th>Bør have nået</th>
    </tr>
  </thead>
  <tbody id="uge-tabel"></tbody>
</table>
</div>

<script>
  if (window.innerWidth < 400) document.documentElement.classList.add('mobile');
  window.addEventListener('resize', () => {
    document.documentElement.classList.toggle('mobile', window.innerWidth < 400);
  });

  if (localStorage.getItem('pin') === 'qwerty123') {
    document.getElementById('lock').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }

  function checkPin() {
    const pin = document.getElementById('pin').value;
    if (pin === 'qwerty123') {
      localStorage.setItem('pin', pin);
      document.getElementById('lock').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    } else {
      document.getElementById('err').style.display = 'block';
    }
  }
  document.getElementById('pin').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const today = now.getDate();
  const maaneder = ['Januar','Februar','Marts','April','Maj','Juni','Juli','August','September','Oktober','November','December'];

  document.getElementById('c-maaned').textContent = maaneder[month] + ' ' + year;
  document.getElementById('tbl-titel').textContent = 'MTD – ' + maaneder[month] + ' ' + year;

  function workdaysInMonth(y, m) {
    const days = new Date(y, m+1, 0).getDate();
    let c = 0;
    for (let d = 1; d <= days; d++) {
      const day = new Date(y, m, d).getDay();
      if (day !== 0 && day !== 6) c++;
    }
    return c;
  }

  function workdaysGone(y, m, upTo) {
    let c = 0;
    for (let d = 1; d <= upTo; d++) {
      const day = new Date(y, m, d).getDay();
      if (day !== 0 && day !== 6) c++;
    }
    return c;
  }

  const arbDage = workdaysInMonth(year, month);
  const arbGaaet = workdaysGone(year, month, today);

  function update() {
    const maal = parseFloat(document.getElementById('inp-maal').value) || 125;
    const timer = parseFloat(document.getElementById('inp-timer').value) || 0;
    const datoMaal = Math.round(maal / arbDage * arbGaaet);

    document.getElementById('c-maal').textContent = maal + ' t';
    document.getElementById('c-dato').textContent = datoMaal + ' t';
    document.getElementById('c-dato-sub').textContent = maal + ' ÷ ' + arbDage + ' × ' + arbGaaet + ' dage';

    const statusEl = document.getElementById('c-status');
    const subEl = document.getElementById('c-status-sub');

    if (timer === 0) {
      statusEl.textContent = '— t';
      statusEl.className = 'card-value';
      subEl.textContent = 'Indtast timer nedenfor';
    } else {
      const diff = timer - datoMaal;
      statusEl.textContent = (diff >= 0 ? '+' : '') + diff + ' t';
      statusEl.className = 'card-value ' + (diff >= 0 ? 'ahead' : 'behind');
      subEl.textContent = diff >= 0 ? 'Forud' : 'Bagud';
    }

    const burde = Math.round(maal / arbDage * arbGaaet);
    document.getElementById('uge-tabel').innerHTML = `
      <tr class="current">
        <td>1. – ${today}. ${maaneder[month].toLowerCase()}</td>
        <td>${arbGaaet} dage</td>
        <td>${burde} t</td>
      </tr>`;
  }

  const savedTimer = localStorage.getItem('timer');
  const savedMaal = localStorage.getItem('maal');
  if (savedTimer) document.getElementById('inp-timer').value = savedTimer;
  if (savedMaal) document.getElementById('inp-maal').value = savedMaal;

  function gemVaerdier() {
    const t = document.getElementById('inp-timer').value;
    const m = document.getElementById('inp-maal').value;
    localStorage.setItem('timer', t);
    localStorage.setItem('maal', m);
    const btn = document.getElementById('gem-btn');
    btn.textContent = 'Gemt';
    btn.className = 'saved';
    document.getElementById('inp-timer').blur();
    document.getElementById('inp-maal').blur();
    update();
  }

  document.getElementById('inp-timer').addEventListener('input', function() {
    const btn = document.getElementById('gem-btn');
    btn.textContent = 'Gem';
    btn.className = 'dirty';
    update();
  });
  document.getElementById('inp-timer').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { this.blur(); update(); }
  });
  document.getElementById('inp-maal').addEventListener('input', function() {
    const btn = document.getElementById('gem-btn');
    btn.textContent = 'Gem';
    btn.className = 'dirty';
    update();
  });
  document.getElementById('inp-maal').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { this.blur(); update(); }
  });
  update();
</script>
</body>
</html>
